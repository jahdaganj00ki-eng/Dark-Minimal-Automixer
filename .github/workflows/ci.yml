name: ci

on:
  push:
    branches: ["main", "master"]
  pull_request:
  workflow_dispatch:

jobs:
  build_test_windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore AutoDJMix.sln

      - name: Build
        run: dotnet build AutoDJMix.sln -c Release --no-restore

      - name: Test
        run: dotnet test AutoDJMix.sln -c Release --no-build --verbosity normal
